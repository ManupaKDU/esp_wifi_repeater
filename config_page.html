<html lang='en'><head><meta name='viewport' content='width=device-width, initial-scale=1'><title>ESP WiFi NAT Router Config</title></head><body><h1>ESP WiFi NAT Router Config</h1><div id='config'><script>if (window.location.search.substr(1) != ''){document.getElementById('config').display = 'none';document.body.innerHTML ='<h1>ESP WiFi NAT Router Config</h1>The new settings have been sent to the device...';setTimeout("location.href = '/'",10000);}</script><h2>STA Settings</h2><form action='' method='GET'><table><tr><td><label for='sta_ssid'>SSID:</label></td><td><input id='sta_ssid' type='text' name='ssid' value='test' required maxlength='32' autocorrect='off' autocapitalize='none' spellcheck='false'/></td></tr><tr><td><label for='sta_password'>Password:</label></td><td><input id='sta_password' type='password' name='password' value='test' maxlength='63' autocorrect='off' autocapitalize='none' spellcheck='false'/></td></tr><tr><td><label for='sta_am'>Automesh:</label></td><td><input id='sta_am' type='checkbox' name='am' value='mesh' %s></td></tr><tr><td></td><td><input type='submit' value='Connect'/></td></tr></table></form><h2>AP Settings</h2><form action='' method='GET'><table><tr><td><label for='ap_ssid'>SSID:</label></td><td><input id='ap_ssid' type='text' name='ap_ssid' value='test' required maxlength='32' autocorrect='off' autocapitalize='none' spellcheck='false'/></td></tr><tr><td><label for='ap_password'>Password:</label></td><td><input id='ap_password' type='text' name='ap_password' value='test' required minlength='8' maxlength='63' aria-describedby='ap_pwd_help' autocorrect='off' autocapitalize='none' spellcheck='false'/></td></tr><tr><td><label for='ap_open'>Security:</label></td><td> <select id='ap_open' name='ap_open' onchange="document.getElementById('ap_password').disabled = (this.value === 'open');"> <option value='open' selected>Open</option> <option value='wpa2'>WPA2</option></select></td></tr><tr><td><label for='ap_network'>Subnet:</label></td><td><input id='ap_network' type='text' name='network' value='0.0.0.0' autocorrect='off' autocapitalize='none' spellcheck='false'/></td></tr><tr><td></td><td><input type='submit' value='Set' /></td></tr></table><small id='ap_pwd_help'><i>Password: </i>min. 8 chars<br /></small><script>document.getElementById('ap_password').disabled = (document.getElementById('ap_open').value === 'open');</script></form><h2>Lock Config</h2><form action='' method='GET'><table><tr><td><label for='lock_device'>Lock Device:</label></td><td><input id='lock_device' type='checkbox' name='lock' value='l'></td></tr><tr><td></td><td><input type='submit' name='dolock' value='Lock'/></td></tr></table></form><h2>Device Management</h2><form action='' method='GET'><table><tr><td>Reset Device:</td><td><input type='submit' name='reset' value='Restart' onclick='return confirm("Are you sure you want to restart the device?");'/></td></tr></table></form></div></body></html>
